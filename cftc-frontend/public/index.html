<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CFTC Comment Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cftc: { 50: '#eff6ff', 100: '#dbeafe', 500: '#1e40af', 600: '#1e3a8a', 700: '#1e3370', 800: '#172554', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .tier-1 { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
    .tier-2 { background: #fffbeb; border-color: #f59e0b; color: #92400e; }
    .tier-3 { background: #f0fdf4; border-color: #22c55e; color: #166534; }
    .sentiment-support { background: #dcfce7; color: #166534; }
    .sentiment-oppose { background: #fee2e2; color: #991b1b; }
    .sentiment-mixed { background: #fef9c3; color: #854d0e; }
    .sentiment-neutral { background: #f1f5f9; color: #475569; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
</body>
</html>
