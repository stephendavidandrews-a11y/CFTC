server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic auth for all requests
    auth_basic "CFTC Command Center";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Service worker must not be cached
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest
    location = /manifest.json {
        auth_basic off;
        add_header Cache-Control "no-cache";
        types { application/manifest+json json; }
    }

    # Proxy tracker API calls to the tracker backend
    location /tracker/ {
        proxy_pass http://tracker:8004/tracker/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;
    }

    # Proxy AI service API calls
    location /ai/api/events/ {
        proxy_pass http://ai:8006/ai/api/events/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering, long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location /ai/api/ {
        proxy_pass http://ai:8006/ai/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;

        client_max_body_size 200M;
    }

    # Proxy intake API calls to the native intake service (GPU-bound, runs on host)
    location /intake/api/ {
        proxy_pass http://host-services:8005/intake/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;

        client_max_body_size 200M;
    }

    # Health check (no auth)
    location /health {
        auth_basic off;
        return 200 '{"status":"ok","service":"command-center"}';
        add_header Content-Type application/json;
    }

    # SPA: serve index.html for all frontend routes (MUST be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
