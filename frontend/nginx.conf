server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic auth for all requests
    auth_basic "CFTC Command Center";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Service worker must not be cached
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        types { application/manifest+json json; }
    }

    # Proxy tracker API calls to the tracker backend
    location /tracker/ {
        proxy_pass http://tracker:8004/tracker/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;
    }

    # Proxy pipeline API calls to the pipeline backend
    location /pipeline/ {
        proxy_pass http://pipeline-backend:8000/pipeline/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;

        client_max_body_size 50M;
    }

    # Legacy pipeline API path
    location /api/v1/pipeline/ {
        proxy_pass http://pipeline-backend:8000/api/v1/pipeline/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;

        client_max_body_size 50M;
    }


    # Health check (no auth)
    location /health {
        auth_basic off;
        proxy_pass http://pipeline-backend:8000/health;
    }

    # SPA: serve index.html for all frontend routes (MUST be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
