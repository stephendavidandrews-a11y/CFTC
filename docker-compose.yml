services:
  # ---------------------------------------------------------------------------
  # Comment Analysis Backend (FastAPI + SQLite)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./services/comments
      dockerfile: Dockerfile
    container_name: cftc-backend
    restart: always
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      CORS_ORIGINS: '["https://${DOMAIN:-localhost}"]'
      APP_ENV: production
      LOG_LEVEL: INFO
    volumes:
      - comments_data:/app/data
      - pdf_storage:/app/pdf_storage

  # ---------------------------------------------------------------------------
  # Pipeline Manager Backend (FastAPI + SQLite)
  # ---------------------------------------------------------------------------
  pipeline-backend:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: cftc-pipeline-backend
    restart: always
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      PIPELINE_USER: ${PIPELINE_USER:?Set PIPELINE_USER in .env}
      PIPELINE_PASS: ${PIPELINE_PASS:?Set PIPELINE_PASS in .env}
      CORS_ORIGINS: '["https://${DOMAIN:-localhost}"]'
      APP_ENV: production
      LOG_LEVEL: INFO
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      MANAGER_EMAIL: ${MANAGER_EMAIL:-}
      CFTC_REGULATORY_DB_PATH: /data/cftc_regulatory.db
      EO_TRACKER_DB_PATH: /data/eo_tracker.db
    volumes:
      - pipeline_data:/app/app/pipeline/data
      - work_data:/app/app/work/data
      - pdf_storage:/app/pdf_storage
      - ./data/cftc_regulatory.db:/data/cftc_regulatory.db:ro
      - ./data/eo_tracker.db:/data/eo_tracker.db:ro

  # ---------------------------------------------------------------------------
  # Tracker Backend (FastAPI + SQLite) — Regulatory Ops Tracker
  # ---------------------------------------------------------------------------
  tracker:
    build:
      context: ./services/tracker
      dockerfile: Dockerfile
    container_name: cftc-tracker
    restart: always
    environment:
      APP_ENV: production
      TRACKER_DB_PATH: /app/data/tracker.db
      TRACKER_UPLOAD_DIR: /app/uploads
      TRACKER_USER: ${TRACKER_USER:?Set TRACKER_USER in .env}
      TRACKER_PASS: ${TRACKER_PASS:?Set TRACKER_PASS in .env}
    volumes:
      - tracker_data:/app/data
      - tracker_uploads:/app/uploads

  # ---------------------------------------------------------------------------
  # Command Center Frontend (React + nginx reverse proxy — main entry point)
  # ---------------------------------------------------------------------------
  command-center:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cftc-command-center
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - pipeline-backend
      - backend
      - tracker

  # ---------------------------------------------------------------------------
  # Caddy (serves personal site only — Cloudflare Tunnel handles SSL)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: cftc-caddy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ../personal-site:/srv/personal-site:ro

volumes:
  comments_data:
  pdf_storage:
  pipeline_data:
  work_data:
  tracker_data:
  tracker_uploads:
  caddy_data:
  caddy_config:
