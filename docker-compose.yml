services:
  # ---------------------------------------------------------------------------
  # Tracker Backend (FastAPI + SQLite) — Regulatory Ops Tracker
  # ---------------------------------------------------------------------------
  tracker:
    build:
      context: ./services/tracker
      dockerfile: Dockerfile
    container_name: cftc-tracker
    restart: always
    environment:
      APP_ENV: production
      TRACKER_DB_PATH: /app/data/tracker.db
      TRACKER_UPLOAD_DIR: /app/uploads
      TRACKER_USER: ${TRACKER_USER:?Set TRACKER_USER in .env}
      TRACKER_PASS: ${TRACKER_PASS:?Set TRACKER_PASS in .env}
    volumes:
      - tracker_data:/app/data
      - tracker_uploads:/app/uploads
    networks:
      - default
      - cftc-shared

  # ---------------------------------------------------------------------------
  # AI Service (FastAPI + SQLite) — AI extraction, review, intelligence
  # ---------------------------------------------------------------------------
  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: cftc-ai
    restart: always
    environment:
      APP_ENV: production
      AI_DB_PATH: /app/data/ai.db
      AI_UPLOAD_DIR: /app/uploads
      AI_AUDIO_WATCH_DIR: /app/audio-inbox
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      TRACKER_BASE_URL: http://tracker:8004/tracker
      TRACKER_USER: ${TRACKER_USER:?Set TRACKER_USER in .env}
      TRACKER_PASS: ${TRACKER_PASS:?Set TRACKER_PASS in .env}
    volumes:
      - ai_data:/app/data
      - ai_uploads:/app/uploads
      - ai_audio_inbox:/app/audio-inbox
    extra_hosts:
      - "host-services:host-gateway"
    depends_on:
      - tracker
    networks:
      - default
      - cftc-shared

  # ---------------------------------------------------------------------------
  # Command Center Frontend (React + nginx reverse proxy — main entry point)
  # ---------------------------------------------------------------------------
  command-center:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cftc-command-center
    restart: always
    ports:
      - "8080:80"
    extra_hosts:
      - "host-services:host-gateway"
    depends_on:
      - tracker
      - ai

  # ---------------------------------------------------------------------------
  # Caddy (serves personal site only — Cloudflare Tunnel handles SSL)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: cftc-caddy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ../personal-site:/srv/personal-site:ro

volumes:
  tracker_data:
  tracker_uploads:
  ai_data:
  ai_uploads:
  ai_audio_inbox:
  caddy_data:
  caddy_config:

networks:
  cftc-shared:
    external: true
